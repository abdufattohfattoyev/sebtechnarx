<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}iPhone Narxlash{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: 0.5px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .btn-primary { background: #1a1a2e; border-color: #1a1a2e; }
        .btn-primary:hover { background: #16213e; border-color: #16213e; }
        .price-badge { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
        .nav-link.active { font-weight: 600; }
        footer { background: #1a1a2e; color: #adb5bd; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand text-white" href="/">
            <i class="bi bi-phone-fill me-2"></i>iPhone Narxlash
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% block nav_index %}{% endblock %}" href="/">
                        <i class="bi bi-calculator me-1"></i>Kalkulyator
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_list %}{% endblock %}" href="/narxlar/">
                        <i class="bi bi-list-ul me-1"></i>Narxlar
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_compare %}{% endblock %}" href="/taqqoslash/">
                        <i class="bi bi-arrow-left-right me-1"></i>Taqqoslash
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-4">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="py-3 mt-4 text-center">
    <small>iPhone Narxlash tizimi</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
